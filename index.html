    <div class="bg-white dark:bg-gray-800 shadow rounded p-4">

      <ul id="historyList" class="space-y-1 text-blue-500 cursor-pointer"></ul>

  <!-- JS -->
  <script>

    const countrySelect = document.getElementById("countrySelect");
    const yearInput = document.getElementById("yearInput");
    const searchBtn = document.getElementById("searchBtn");
    const exportBtn = document.getElementById("exportBtn");

    const monthFilter = document.getElementById("monthFilter");
    const typeFilter = document.getElementById("typeFilter");

    const holidayResults = document.getElementById("holidayResults");
    const loading = document.getElementById("loading");
    const errorMessage = document.getElementById("errorMessage");

    const totalCount = document.getElementById("totalCount");
    const historyList = document.getElementById("historyList");

    const themeToggle = document.getElementById("themeToggle");
    const clearHistory = document.getElementById("clearHistory");

    let history = [];
    let currentHolidays = [];

    /* ------------------------------
      Dark Mode
    ------------------------------ */
    themeToggle.addEventListener("click", () => {

      document.documentElement.classList.toggle("dark");

      themeToggle.textContent =
        document.documentElement.classList.contains("dark")
          ? "☀️ Light"
          : "🌙 Dark";
    });

    /* ------------------------------
      Loading
    ------------------------------ */
    function showLoading(show) {
      loading.classList.toggle("hidden", !show);
    }

    /* ------------------------------
      Fetch API
    ------------------------------ */
    async function fetchHolidays(country, year) {

      const url =
        `https://date.nager.at/api/v3/PublicHolidays/${year}/${country}`;

      try {

        showLoading(true);
        errorMessage.classList.add("hidden");

        const res = await fetch(url);

        if (!res.ok) throw new Error("API Error");

        const data = await res.json();

        showLoading(false);

        return data;

      } catch (err) {

        showLoading(false);

        errorMessage.textContent =
          "Failed to load data. Try again.";

        errorMessage.classList.remove("hidden");

        return null;
      }
    }

    /* ------------------------------
      Filter Data
    ------------------------------ */
    function applyFilters(data) {

      let filtered = [...data];

      // Month
      if (monthFilter.value !== "") {

        filtered = filtered.filter(h => {

          return new Date(h.date).getMonth() ==
            monthFilter.value;
        });
      }

      // Type
      if (typeFilter.value !== "") {

        filtered = filtered.filter(h =>

          h.types.includes(typeFilter.value)
        );
      }

      return filtered;
    }

    /* ------------------------------
      Display Holidays
    ------------------------------ */
    function displayHolidays(data) {

      holidayResults.innerHTML = "";

      totalCount.textContent = data.length;

      if (data.length === 0) {

        holidayResults.innerHTML =
          `<p class="col-span-full text-center">
          No holidays found.
          </p>`;

        return;
      }

      const today = new Date();

      data.forEach(h => {

        const dateObj = new Date(h.date);

        const isUpcoming = dateObj >= today;

        const day =
          dateObj.toLocaleDateString("en-US",
            { weekday: "long" });

        const card = document.createElement("div");

        card.className =
          `p-4 rounded shadow bg-white dark:bg-gray-800
          ${isUpcoming ? "border-2 border-green-400" : ""}`;

        card.innerHTML = `

          <h3 class="font-bold text-blue-600 dark:text-blue-400">
            ${h.name}
          </h3>

          <p>Date: ${h.date}</p>
          <p>Local: ${h.localName || "N/A"}</p>
          <p>Country: ${h.countryCode}</p>
          <p>Type: ${h.types.join(", ")}</p>
          <p>Day: ${day}</p>

          ${isUpcoming ?
            `<p class="text-green-500 font-semibold">
              Upcoming
            </p>` : ""}
        `;

        holidayResults.appendChild(card);

      });
    }

    /* ------------------------------
      Search
    ------------------------------ */
    async function search() {

      const country = countrySelect.value;
      const year = yearInput.value;

      if (!year) return;

      const data = await fetchHolidays(country, year);

      if (!data) return;

      currentHolidays = applyFilters(data);

      displayHolidays(currentHolidays);

      addHistory(country, year);
    }

    /* ------------------------------
      History
    ------------------------------ */
    function addHistory(country, year) {

      const item = `${country}-${year}`;

      if (!history.includes(item)) {

        history.push(item);
        renderHistory();
      }
    }

    function renderHistory() {

      historyList.innerHTML = "";

      history.forEach(h => {

        const li = document.createElement("li");

        li.textContent = h;
        li.className = "hover:underline";

        li.onclick = () => {

          const [c, y] = h.split("-");

          countrySelect.value = c;
          yearInput.value = y;

          search();
        };

        historyList.appendChild(li);
      });
    }

    clearHistory.onclick = () => {

      history = [];
      renderHistory();
    };

    /* ------------------------------
      Export CSV
    ------------------------------ */
    function exportCSV() {

      if (currentHolidays.length === 0) return;

      let csv =
        "Name,Date,LocalName,Country,Type,Day\n";

      currentHolidays.forEach(h => {

        const day =
          new Date(h.date)
            .toLocaleDateString("en-US",
              { weekday: "long" });

        csv += `"${h.name}","${h.date}",
        "${h.localName}","${h.countryCode}",
        "${h.types.join("|")}","${day}"\n`;
      });

      const blob = new Blob([csv], { type: "text/csv" });

      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");

      a.href = url;
      a.download = "holidays.csv";
      a.click();
    }

    /* ------------------------------
      Events
    ------------------------------ */
    searchBtn.onclick = search;

    exportBtn.onclick = exportCSV;

    monthFilter.onchange = () => {

      displayHolidays(
        applyFilters(currentHolidays)
      );
    };

    typeFilter.onchange = () => {

      displayHolidays(
        applyFilters(currentHolidays)
      );
    };

  </script>
